<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" height="40">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6900f2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Shopping Bag with Check -->
  <g transform="translate(10, 10)">
    <rect x="5" y="15" width="40" height="45" rx="8" fill="url(#primaryGradient)" />
    <path d="M15 15 L15 10 A 10 10 0 0 1 35 10 L35 15" stroke="url(#primaryGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Checkmark inside bag -->
    <path d="M15 35 L22 42 L35 28" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: eCommax -->
  <text x="65" y="52" font-family="'Poppins', sans-serif" font-weight="700" font-size="38" fill="url(#primaryGradient)">eCommax</text>
</svg>
